<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Deixa eu utilizar caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <link rel="icon" href="./Nova Logo.png" sizes= type="image/png">

    <!-- Style serve para estilizar o visual da pagina -->
    <!-- O asterisco serve para selecionar todos os elementos -->
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

     body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #210291, #2b2727);
    }
      /* O login-container serve para organizar o quadro em branco onde terá as informaçoes de login*/
    .login-container {
      background: white;
      padding: 100px;
      border-radius: 10px;
      width: 500px;
      box-shadow: 0 4px 10px rgba(102, 97, 97, 0.2);
      text-align: center;
    }

     /* titulo do bloco em branco*/
    .login-container h2 {
      margin-bottom: 20px;
    }

     /* Aqui fica o email e a senha*/
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }
     /* MUda o tamanho da fonte*/
    .input-group label {
      font-size: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
      /* O botão de login onde o usuario terá acesso ao site*/
    .login-btn {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    /* Quando o cursor do mouse passar por cima do botão a cor automaticamnete irá mudar*/
    .login-btn:hover {
      background: #3a8de0;
    }

    /* Aqui ficam os links de criar conta e esqueceu a senha*/
    .extra-links {
      margin-top: 15px;
      font-size: 14px;
    }

    .extra-links a {
      color: #4facfe;
      text-decoration: none;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>

</head>

<!-- Conteúdo da página -->
<body>
<!-- Criar  o bloco de login-->
  <div class="login-container">
    <h2>LOGIN</h2>

      <form>
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <!--campo onde será digitado o email do usuario para ter acesso ao site-->
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>
        <!--campo onde será digitada a senha do usuario para ter acesso ao site-->
        <!-- O required serve para obrigar o usuario a preencher o campo para ter acesso ao site-->
        <!--O password serve para ocultar a senha do usuario -->
      </div>

      <button type="submit" class="login-btn">Entrar</button>
    </form>

    <div class="extra-links">
      <p><a href="#">Esqueceu a senha?</a></p>
      <p><a href="#">Criar conta</a></p>
    </div>
  </div>
</body>
</html>
