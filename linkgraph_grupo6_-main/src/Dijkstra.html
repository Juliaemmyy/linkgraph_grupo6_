<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LinkGraph Friends</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f0f2f5;
}

/* HEADER */

header{
    width:100%;
    height:70px;
    background:white;
    border-bottom:1px solid #ddd;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logo span{
    color:#1877f2;
}

.menu{
    display:flex;
    gap:15px;
}

.icon{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#f0f2f5;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    transition:.3s;
}

.icon:hover{
    background:#ddd;
}

/* CONTAINER */

.container{
    width:100%;
    max-width:1400px;

    margin:100px auto;

    display:grid;
    grid-template-columns:350px 1fr;

    gap:20px;

    padding:20px;
}

/* SIDEBAR */

.sidebar{
    background:white;
    border-radius:20px;
    padding:20px;
    height:fit-content;
}

.sidebar h2{
    margin-bottom:20px;
}

/* INPUTS */

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

.input-group input,
.input-group select{
    width:100%;
    height:45px;

    border:none;
    background:#f0f2f5;

    border-radius:12px;
    padding:0 15px;
}

/* BUTTON */

.btn{
    width:100%;
    height:45px;

    border:none;
    border-radius:12px;

    background:#1877f2;
    color:white;

    cursor:pointer;
    font-weight:bold;

    transition:.3s;
}

.btn:hover{
    transform:scale(1.02);
}

/* FRIEND AREA */

.friends-area{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* FRIEND CARD */

.friend-card{
    background:white;
    border-radius:20px;
    padding:20px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.friend-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.friend-left img{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}

.friend-info h3{
    margin-bottom:5px;
}

.friend-info p{
    color:gray;
    font-size:14px;
}

/* STATUS */

.online{
    color:#22c55e;
    font-weight:bold;
}

/* ADD BUTTON */

.add-btn{
    border:none;
    background:#1877f2;
    color:white;

    padding:10px 20px;
    border-radius:10px;

    cursor:pointer;
}

/* RESULT */

.result{
    margin-top:20px;
    padding:15px;
    background:#eef6ff;
    border-radius:12px;
    display:none;
}

.result h3{
    color:#1877f2;
    margin-bottom:10px;
}

/* RESPONSIVO */

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>

<div class="logo">
Link<span>Graph</span>
</div>

<div class="menu">

<div class="icon">
<i class="fa-solid fa-house"> <link rel="stylesheet" href="home.html"></i>
</div>

<div class="icon">
<i class="fa-solid fa-user-group"></i>
</div>

<div class="icon">
<i class="fa-solid fa-bell"></i>
</div>

</div>

</header>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>
<i class="fa-solid fa-network-wired"></i>
 Conexões Inteligentes
</h2>

<div class="input-group">
<label>Origem</label>
<select id="source"></select>
</div>

<div class="input-group">
<label>Destino</label>
<select id="target"></select>
</div>

<button class="btn" onclick="runDijkstra()">
Encontrar Melhor Conexão
</button>

<div class="result" id="resultBox">

<h3>Melhor Caminho</h3>

<p id="resultText"></p>

</div>

</div>

<!-- FRIENDS -->

<div class="friends-area" id="friendsArea">

</div>

</div>

<script>

/* =========================
   USUÁRIOS
========================= */

const users = [

{
    name:"Ricardo Neto",
    profession:"Mentor Front-End",
    img:"https://i.pravatar.cc/150?img=1",
    online:true
},

{
    name:"João Gabriel",
    profession:"Especialista em IA",
    img:"https://i.pravatar.cc/150?img=2",
    online:true
},

{
    name:"Ana Clara",
    profession:"UX Designer",
    img:"https://i.pravatar.cc/150?img=3",
    online:false
},

{
    name:"Carlos Eduardo",
    profession:"Back-End Developer",
    img:"https://i.pravatar.cc/150?img=4",
    online:true
},

{
    name:"Fernanda Lima",
    profession:"Cientista de Dados",
    img:"https://i.pravatar.cc/150?img=5",
    online:false
}

];

/* =========================
   CONEXÕES
========================= */

const graph = {

"Ricardo Neto":{
    "João Gabriel":2,
    "Ana Clara":4
},

"João Gabriel":{
    "Ricardo Neto":2,
    "Carlos Eduardo":1
},

"Ana Clara":{
    "Ricardo Neto":4,
    "Fernanda Lima":2
},

"Carlos Eduardo":{
    "João Gabriel":1,
    "Fernanda Lima":3
},

"Fernanda Lima":{
    "Carlos Eduardo":3,
    "Ana Clara":2
}

};

/* =========================
   RENDERIZAR AMIGOS
========================= */

function renderFriends(){

const area = document.getElementById("friendsArea");

users.forEach(user=>{

area.innerHTML += `

<div class="friend-card">

<div class="friend-left">

<img src="${user.img}">

<div class="friend-info">

<h3>${user.name}</h3>

<p>${user.profession}</p>

<p class="${user.online ? 'online':''}">
${user.online ? 'Online':'Offline'}
</p>

</div>

</div>

<button class="add-btn">
Adicionar
</button>

</div>

`;

});

}

/* =========================
   DROPDOWNS
========================= */

function loadSelects(){

const source = document.getElementById("source");
const target = document.getElementById("target");

users.forEach(user=>{

source.innerHTML += `
<option>${user.name}</option>
`;

target.innerHTML += `
<option>${user.name}</option>
`;

});

}

/* =========================
   DIJKSTRA
========================= */

function runDijkstra(){

const start = document.getElementById("source").value;

const end = document.getElementById("target").value;

let distances = {};
let visited = {};
let previous = {};

for(let node in graph){

distances[node] = Infinity;
previous[node] = null;

}

distances[start] = 0;

while(true){

let closestNode = null;

for(let node in distances){

if(
!visited[node] &&
(
closestNode === null ||
distances[node] < distances[closestNode]
)
){

closestNode = node;

}

}

if(closestNode === end) break;

if(closestNode === null) break;

visited[closestNode] = true;

for(let neighbor in graph[closestNode]){

let newDistance =
distances[closestNode] +
graph[closestNode][neighbor];

if(newDistance < distances[neighbor]){

distances[neighbor] = newDistance;

previous[neighbor] = closestNode;

}

}

}

/* CAMINHO */

let path = [];

let current = end;

while(current){

path.unshift(current);

current = previous[current];

}

document.getElementById("resultBox").style.display = "block";

document.getElementById("resultText").innerHTML = `

<strong>Caminho:</strong>
${path.join(" → ")}

<br><br>

<strong>Nível de conexão:</strong>
${distances[end]}

`;

}

/* INIT */

renderFriends();

loadSelects();

</script>

</body>
</html>
